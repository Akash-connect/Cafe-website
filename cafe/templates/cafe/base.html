{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cafe Website{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'cafe/style.css' %}">
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">☕ Brew Haven</div>
            <nav>
                <a href="/">Home</a>
                <a href="/about/">About</a>
                <a href="/menu/">Menu</a>
                <a href="/contact/">Contact</a>
            </nav>
        </div>
    </header>

    {% block content %}
    {% endblock %}

    <footer class="footer">
        <div class="container">
            <p>© 2026 Brew Haven. Crafted with coffee and calm.</p>
        </div>
    </footer>

</body>
</html>
